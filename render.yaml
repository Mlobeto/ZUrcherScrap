services:
  - type: web
    name: scrapzurcher-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && node_modules/.bin/playwright install chromium --with-deps && npm run build -w @scrapzurcher/api
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false        # set to your Vercel URL, e.g. https://zurcher.vercel.app
      - key: SCRAPE_LOOKBACK_DAYS
        value: "30"
