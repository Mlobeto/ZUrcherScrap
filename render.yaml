services:
  - type: web
    name: scrapzurcher-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright node_modules/.bin/playwright install chromium --with-deps && npm run build -w @scrapzurcher/api
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SCRAPE_LOOKBACK_DAYS
        value: "30"
