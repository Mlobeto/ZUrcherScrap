services:
  - type: web
    name: scrapzurcher-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build -w @scrapzurcher/api
    startCommand: node_modules/.bin/playwright install chromium && node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SCRAPE_LOOKBACK_DAYS
        value: "30"
